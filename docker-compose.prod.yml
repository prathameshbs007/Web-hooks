# Production overlay: `docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d`.
#
# Public surface = the dashboard/API only, behind Caddy (automatic TLS).
# Everything else (Postgres, Redis, Grafana, Prometheus, the demo receiver) runs
# on the internal network with no public port. Grafana is bound to 127.0.0.1 so
# an operator can reach it over an SSH tunnel, never from the internet.
#
# Secrets come from .env — never commit real values:
#   ADMIN_TOKEN, LLM_API_KEY, RELAY_DOMAIN, GF_SECURITY_ADMIN_PASSWORD

services:
  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      RELAY_DOMAIN: ${RELAY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  postgres:
    ports: []
    restart: always

  redis:
    ports: []
    restart: always

  api:
    restart: always
    ports: []

  worker:
    restart: always
    deploy:
      replicas: 2

  retry-scheduler:
    restart: always

  agent:
    restart: always

  # The demo receiver stays running (internal only) so the public dashboard is
  # interactive — visitors can point an endpoint at it and watch the pipeline.
  # Not exposed to the host. Drop this override to omit it from a real prod run.
  flaky-endpoint:
    ports: []
    restart: always

  prometheus:
    restart: always
    ports: []

  grafana:
    restart: always
    # 127.0.0.1 only: reachable via `ssh -L 3000:localhost:3000 <vm>`, never public.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      GF_AUTH_ANONYMOUS_ENABLED: "false"

volumes:
  caddy_data:
  caddy_config:
