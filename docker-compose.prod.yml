# Production overlay: `docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d`.
#
# Differences from the dev compose:
#   - Caddy terminates TLS and is the only service with published ports.
#   - Postgres and Redis are NOT exposed to the host (dev maps them for tests).
#   - api/worker/scheduler/agent do not publish ports; Caddy/Prometheus reach
#     them over the compose network.
#   - Two workers by default; scale with --scale worker=N.
#   - restart: always everywhere.
#
# Secrets (ADMIN_TOKEN, LLM_API_KEY, RELAY_DOMAIN, GRAFANA_DOMAIN,
# GF_SECURITY_ADMIN_PASSWORD) come from .env — never commit real values.

services:
  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      RELAY_DOMAIN: ${RELAY_DOMAIN}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - grafana

  postgres:
    ports: []
    restart: always

  redis:
    ports: []
    restart: always

  api:
    restart: always
    ports: []

  worker:
    restart: always
    deploy:
      replicas: 2

  retry-scheduler:
    restart: always

  agent:
    restart: always

  # The flaky simulator is a dev/demo fixture — don't run it in prod. Override
  # to a no-op so `-f prod` doesn't start it. Remove this block if you want the
  # bundled demo receiver available.
  flaky-endpoint:
    profiles: ["donotstart"]

  prometheus:
    restart: always
    ports: []

  grafana:
    restart: always
    ports: []
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}
      GF_AUTH_ANONYMOUS_ENABLED: "false"

volumes:
  caddy_data:
  caddy_config:
