global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: relay-api
    static_configs:
      - targets: ["api:8000"]

  # Worker and scheduler have no HTTP server of their own; each starts a
  # prometheus_client endpoint purely for scraping.
  - job_name: relay-worker
    static_configs:
      - targets: ["worker:9100"]

  - job_name: relay-retry-scheduler
    static_configs:
      - targets: ["retry-scheduler:9101"]

  - job_name: relay-agent
    static_configs:
      - targets: ["agent:9102"]
