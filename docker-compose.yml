services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    # Host port exposed so integration tests (pytest on the host) can reach it.
    # 5433 on the host: avoids colliding with a natively installed PostgreSQL.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://relay:relay@postgres:5432/relay
      REDIS_URL: redis://redis:6379/0
    # Run migrations before serving; safe to re-run on every start.
    command: sh -c "alembic upgrade head && uvicorn relay.api.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    # Defense in depth: the worker supervises its own shard tasks, but if the
    # process ever does exit, Docker brings it back.
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://relay:relay@postgres:5432/relay
      REDIS_URL: redis://redis:6379/0
    command: python -m relay.delivery.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  flaky-endpoint:
    build: .
    ports:
      - "9000:9000"
    command: uvicorn flaky_endpoint.main:app --host 0.0.0.0 --port 9000

volumes:
  pgdata:
